name: Check README Links

on:
  push:
    paths:
      - README.md
      - .github/workflows/link-check.yml
  pull_request:
    paths:
      - README.md
      - .github/workflows/link-check.yml
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check README links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress README.md
